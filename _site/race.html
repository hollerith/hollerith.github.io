<html>
<head>
  <script src="assets/js/cell.min.js"></script>
  <script src='assets/js/utils.js'></script>
  <script src='assets/js/index.js'></script>
  <link rel="stylesheet" href="assets/css/style.css" type="text/css" />
  <style>
.bar {
  fill: yellow;
  height: 11px;
  -webkit-transition: fill .3s ease;
  transition: fill .3s ease;
  cursor: pointer;
}
.bar text {
  fill: limegreen;
  font-size: 11px;
}

.legendbox {
  fill: darkorange;
  font-weight: bold;
}

.legendtext {
  fill: aliceblue;
  font-weight: bold;
  font-size: x-large;
  font-family: Noto Mono;
}

.chart:hover .bar,
.chart:focus .bar {
  fill: yellow;
}

.bar:hover,
.bar:focus {
  fill: red !important;
}
.bar:hover text,
.bar:focus text {
  fill: red;
}

figcaption {
  font-size: large;
  font-weight: bold;
  color: aliceblue;
  margin-bottom: 20px;
}

  </style>
